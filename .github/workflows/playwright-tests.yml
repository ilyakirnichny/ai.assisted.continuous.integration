name: Playwright Tests

# Trigger only on pull requests targeting main
on:
  pull_request:
    branches: [ main ]

# Minimal read-only permissions
permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      CI: true

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with npm cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # Install dependencies using npm clean install
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers along with system dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run Playwright tests in parallel
      - name: Run Playwright tests
        run: npx playwright test

      # Upload HTML report artifact (always, even on failure)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # Upload Playwright traces artifact (always, even on failure)
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30

      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Playwright Tests Failed",
            "themeColor": "FF0000",
            "title": "❌ Playwright Tests Failed",
            "sections": [{
              "facts": [
                { "name": "PR Title", "value": "${{ github.event.pull_request.title }}" },
                { "name": "Author", "value": "${{ github.event.pull_request.user.login }}" },
                { "name": "Branch", "value": "${{ github.head_ref }}" },
                { "name": "Workflow Run", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
              ]
            }]
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"

      - name: Fetch previous history from gh-pages
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git show origin/gh-pages:history.json > /tmp/prev-history.json 2>/dev/null; then
            echo "Previous history found"
          else
            echo '[]' > /tmp/prev-history.json
          fi

      - name: Build and write history.json
        if: always() && github.ref == 'refs/heads/main'
        run: |
          PREV=/tmp/prev-history.json
          ENTRY=$(node -e "
            const fs = require('fs');
            const results = fs.existsSync('test-results/results.json')
              ? JSON.parse(fs.readFileSync('test-results/results.json','utf8'))
              : null;
            const passed  = results?.stats?.expected  ?? 0;
            const failed  = results?.stats?.unexpected ?? 0;
            const skipped = results?.stats?.skipped    ?? 0;
            console.log(JSON.stringify({
              timestamp:   new Date().toISOString(),
              run_url:     '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              commit:      '${{ github.sha }}',
              ref:         '${{ github.ref }}',
              conclusion:  failed > 0 ? 'failure' : 'success',
              passed, failed, skipped
            }));
          ")
          node -e "
            const fs = require('fs');
            const prev = JSON.parse(fs.readFileSync('$PREV','utf8'));
            const entry = JSON.parse(process.argv[1]);
            prev.push(entry);
            fs.writeFileSync('playwright-report/history.json', JSON.stringify(prev, null, 2));
          " "$ENTRY"

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deploy-pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability scan
        id: audit
        run: |
          echo "## Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if npm audit --audit-level=high --json > audit-output.json 2>&1; then
            echo "✅ No high or critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ High or critical vulnerabilities detected:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat audit-output.json | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const vulns = data.vulnerabilities || {};
              const high = Object.values(vulns).filter(v => ['high','critical'].includes(v.severity));
              high.forEach(v => console.log(v.severity.toUpperCase() + ': ' + v.name + ' - ' + (v.via?.[0]?.title || 'see details')));
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || cat audit-output.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
