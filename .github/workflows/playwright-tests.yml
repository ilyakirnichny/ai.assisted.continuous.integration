name: Playwright Tests

# Trigger only on pull requests targeting main
on:
  pull_request:
    branches: [ main ]

# Minimal read-only permissions
permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with npm cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # Install dependencies using npm clean install
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers along with system dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run Playwright tests in parallel
      - name: Run Playwright tests
        run: npx playwright test

      # Upload HTML report artifact (always, even on failure)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # Upload Playwright traces artifact (always, even on failure)
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30

      # Notify Microsoft Teams on workflow failure
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Playwright Tests Failed",
            "themeColor": "FF0000",
            "title": "❌ Playwright Tests Failed",
            "sections": [{
              "facts": [
                { "name": "PR Title", "value": "${{ github.event.pull_request.title }}" },
                { "name": "Author", "value": "${{ github.event.pull_request.user.login }}" },
                { "name": "Branch", "value": "${{ github.head_ref }}" },
                { "name": "Workflow Run", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
              ]
            }]
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
